<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rose Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* ── CONFIG ─────────────────────────────────── */
const CFG = {
  maxRoses:       10,
  fallSpeedMin:   1.2,
  fallSpeedMax:   2.8,
  rotSpeedMin:    0.4,
  rotSpeedMax:    2.0,
  swayAmp:        18,
  swayFreq:       0.018,
  stackPad:       4,
  particlesEvery: 2,
  particleLife:   28,
  COLS:           12,
};

/* ── CANVAS ──────────────────────────────────── */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  rebuildStack();
}
window.addEventListener('resize', resize);

/* ── STATE (all declared before any function uses them) ── */
let roses     = [];
let particles = [];
let stackH    = [];   // per-column stack height from bottom
let frame     = 0;

function initStack() {
  stackH = new Array(CFG.COLS).fill(0);
}

function rebuildStack() {
  initStack();
  roses.filter(r => r.resting).forEach(r => {
    const col = colFor(r.x);
    r.restY   = H - r.size * 0.5 - stackH[col];
    stackH[col] += r.size * 0.7 + CFG.stackPad;
  });
}

function colFor(x) {
  return Math.max(0, Math.min(CFG.COLS - 1, Math.floor((x / W) * CFG.COLS)));
}

/* ── ROSE EMOJI CACHE ───────────────────────── */
const roseCache = {};
function getRose(size) {
  const s = Math.round(size);
  if (roseCache[s]) return roseCache[s];
  const oc = document.createElement('canvas');
  oc.width = oc.height = s * 2;
  const ox = oc.getContext('2d');
  ox.font          = `${s * 1.4}px serif`;
  ox.textAlign     = 'center';
  ox.textBaseline  = 'middle';
  ox.fillText('🌹', s, s);
  roseCache[s] = oc;
  return oc;
}

/* ── SPAWN ───────────────────────────────────── */
function spawnRose(count) {
  const n = Math.min(parseInt(count) || 1, 20);
  for (let i = 0; i < n; i++) {
    setTimeout(_spawnOne, i * 130);
  }
}

function _spawnOne() {
  // cull oldest resting rose if at cap
  if (roses.length >= CFG.maxRoses) {
    const idx = roses.findIndex(r => r.resting);
    if (idx !== -1) { roses.splice(idx, 1); rebuildStack(); }
    else             roses.shift();
  }
  const size = 32 + Math.random() * 16;
  const x    = size + Math.random() * (W - size * 2);
  roses.push({
    x,
    y:        -size,
    vy:       CFG.fallSpeedMin + Math.random() * (CFG.fallSpeedMax - CFG.fallSpeedMin),
    rot:      Math.random() * Math.PI * 2,
    rotSpeed: (CFG.rotSpeedMin + Math.random() * (CFG.rotSpeedMax - CFG.rotSpeedMin))
              * (Math.random() < 0.5 ? 1 : -1) * (Math.PI / 180),
    swayOff:  Math.random() * Math.PI * 2,
    size,
    resting:  false,
    restY:    0,
  });
}

// Expose globally so Tikfinity "Run JavaScript" can call it
window.spawnRose = spawnRose;

/* ── PARTICLES ───────────────────────────────── */
const PETAL_COLS = ['#ff3366','#ff6699','#ff99bb','#ffccdd','#ff1144','#e8004d'];

function emitParticles(x, y, n) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.3 + Math.random() * 1.1;
    particles.push({
      x, y,
      vx:      Math.cos(angle) * speed,
      vy:      Math.sin(angle) * speed - 0.6,
      life:    CFG.particleLife,
      maxLife: CFG.particleLife,
      size:    2 + Math.random() * 3.5,
      color:   PETAL_COLS[Math.floor(Math.random() * PETAL_COLS.length)],
    });
  }
}

/* ── UPDATE ──────────────────────────────────── */
function update() {
  frame++;

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.04;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = roses.length - 1; i >= 0; i--) {
    const r = roses[i];
    if (r.resting) { r.rot += r.rotSpeed * 0.06; continue; }

    r.x  += Math.sin(frame * CFG.swayFreq + r.swayOff) * CFG.swayAmp * 0.04;
    r.x   = Math.max(r.size * 0.5, Math.min(W - r.size * 0.5, r.x));
    r.y  += r.vy;
    r.rot += r.rotSpeed;

    if (frame % CFG.particlesEvery === 0) emitParticles(r.x, r.y, 2);

    const col   = colFor(r.x);
    const restY = H - r.size * 0.5 - stackH[col];
    if (r.y >= restY) {
      r.resting  = true;
      r.restY    = restY;
      stackH[col] += r.size * 0.7 + CFG.stackPad;
      emitParticles(r.x, restY, 8);
    }

    if (r.y > H + r.size) roses.splice(i, 1);
  }
}

/* ── DRAW ────────────────────────────────────── */
function draw() {
  ctx.clearRect(0, 0, W, H);

  particles.forEach(p => {
    const t = p.life / p.maxLife;
    ctx.globalAlpha = t * 0.85;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * t, 0, Math.PI * 2);
    ctx.fill();
  });

  roses.forEach(r => {
    const img  = getRose(r.size);
    const half = r.size;
    ctx.globalAlpha = 1;
    ctx.save();
    ctx.translate(r.x, r.resting ? r.restY : r.y);
    ctx.rotate(r.rot);
    if (!r.resting) { ctx.shadowColor = '#ff3366'; ctx.shadowBlur = 10; }
    ctx.drawImage(img, -half, -half, half * 2, half * 2);
    ctx.restore();
  });

  ctx.globalAlpha = 1;
  ctx.shadowBlur  = 0;
}

/* ── LOOP ────────────────────────────────────── */
function loop() { update(); draw(); requestAnimationFrame(loop); }

// Kick everything off after DOM is ready
resize();
loop();

/* ── DEV: press R to test ───────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') spawnRose(1 + Math.floor(Math.random() * 5));
});
</script>
</body>
</html>
